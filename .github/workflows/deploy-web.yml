name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.2.2

jobs:
  build-web:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Godot + Web export templates
        run: |
          set -euo pipefail
          curl -L --fail --retry 3 -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64
          sudo mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot

          curl -L --fail --retry 3 -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q -o templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          ls ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ | head -10

      - name: Import project
        run: |
          timeout 30 godot --headless --import --path . || true
          timeout 10 godot --headless --quit --path . || true

      - name: Run invariant test suite
        run: |
          timeout 120 godot --headless --path . --script res://scripts/tests/test_suite.gd

      - name: Export for Web
        run: |
          mkdir -p build/web
          godot --headless --verbose --path . --export-release "Web" build/web/index.html

      - name: Add COOP/COEP service worker for SharedArrayBuffer
        run: |
          cp web/coi-serviceworker.js build/web/coi-serviceworker.js
          sed -i 's|<head>|<head><script src="coi-serviceworker.js"></script>|' build/web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build-web
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
