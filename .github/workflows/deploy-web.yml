name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.2.2

jobs:
  build-web:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Godot + Web export templates
        run: |
          set -euo pipefail
          curl -L --fail --retry 3 -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64
          sudo mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot

          curl -L --fail --retry 3 -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q -o templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Clean import project
        run: |
          rm -rf .godot/
          timeout 60 godot --headless --import --path . || true
          timeout 10 godot --headless --quit --path . || true

      - name: Export for Web
        run: |
          # Switch to sphere scene + gl_compatibility for web export
          sed -i 's|renderer/rendering_method="mobile"|renderer/rendering_method="gl_compatibility"|' project.godot
          sed -i 's|run/main_scene="res://main.tscn"|run/main_scene="res://sphere.tscn"|' project.godot
          sed -i '/anti_aliasing/d' project.godot
          mkdir -p build/web
          godot --headless --verbose --path . --export-release "Web" build/web/index.html

      - name: Assemble deployment with COOP/COEP service worker
        run: |
          set -euo pipefail
          # Copy service worker
          cp web/coi-serviceworker.js build/web/coi-serviceworker.js

          # Cache-bust: rename assets with commit hash to force browser reload
          HASH=$(git rev-parse --short HEAD)
          for ext in wasm pck js; do
            for f in build/web/index.${ext}; do
              [ -f "$f" ] && mv "$f" "build/web/index.${HASH}.${ext}"
            done
          done
          # Update references in HTML
          sed -i "s|index\\.wasm|index.${HASH}.wasm|g" build/web/index.html
          sed -i "s|index\\.pck|index.${HASH}.pck|g" build/web/index.html
          sed -i "s|\"index\\.js\"|\"index.${HASH}.js\"|g" build/web/index.html
          # Update references in JS
          if [ -f "build/web/index.${HASH}.js" ]; then
            sed -i "s|index\\.wasm|index.${HASH}.wasm|g" "build/web/index.${HASH}.js"
            sed -i "s|index\\.pck|index.${HASH}.pck|g" "build/web/index.${HASH}.js"
          fi

          # Rename Godot's index.html to game.html
          mv build/web/index.html build/web/game.html

          # Patch game.html: redirect to loader if not isolated
          sed -i 's|</head>|<script>if(!window.crossOriginIsolated){window.location.replace("index.html");}</script></head>|' build/web/game.html

          # Create index.html as the entry point (handles SW lifecycle)
          cat > build/web/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Clockwork Epicycles</title>
          <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            html, body { width: 100%; height: 100%; background: #070a10; color: #c8ccd4; font-family: system-ui, sans-serif; overflow: hidden; }
            #status { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 12px; }
            #status p { font-size: 14px; opacity: 0.7; }
            #status .spinner { width: 24px; height: 24px; border: 3px solid #333; border-top-color: #7fe7ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
            @keyframes spin { to { transform: rotate(360deg); } }
          </style>
          </head>
          <body>
          <div id="status">
            <div class="spinner"></div>
            <p id="msg">Initializing...</p>
          </div>
          <script>
          (async function() {
            const msg = document.getElementById("msg");

            // Already isolated? Go straight to the game.
            if (window.crossOriginIsolated) {
              window.location.replace("game.html");
              return;
            }

            if (!("serviceWorker" in navigator)) {
              msg.textContent = "Your browser doesn't support Service Workers. Try Chrome or Firefox.";
              return;
            }

            try {
              msg.textContent = "Enabling cross-origin isolation...";
              const registration = await navigator.serviceWorker.register("coi-serviceworker.js");

              // Wait for active
              await new Promise((resolve, reject) => {
                const sw = registration.installing || registration.waiting || registration.active;
                if (!sw) { reject(new Error("No service worker found")); return; }
                if (sw.state === "activated" || sw.state === "activating") { resolve(); return; }
                sw.addEventListener("statechange", function handler() {
                  if (sw.state === "activated") { sw.removeEventListener("statechange", handler); resolve(); }
                });
                setTimeout(() => resolve(), 3000);
              });

              // Wait for the SW to claim this client
              if (!navigator.serviceWorker.controller) {
                msg.textContent = "Activating isolation headers...";
                await new Promise((resolve) => {
                  navigator.serviceWorker.addEventListener("controllerchange", resolve, { once: true });
                  setTimeout(resolve, 2000);
                });
              }

              // Reload — the SW will now intercept and add COOP/COEP headers.
              // On the next load, crossOriginIsolated will be true and we redirect to game.html.
              msg.textContent = "Reloading with isolation enabled...";
              window.location.reload();

            } catch(e) {
              msg.textContent = "Could not enable cross-origin isolation: " + e.message;
              console.error(e);
            }
          })();
          </script>
          </body>
          </html>
          HTMLEOF

          # Verify files
          echo "=== Deployment contents ==="
          ls -la build/web/
          echo "=== index.html head ==="
          head -5 build/web/index.html
          echo "=== game.html check ==="
          grep -c "crossOriginIsolated" build/web/game.html || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build-web
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
