name: Build Clockwork macOS App

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

env:
  GODOT_VERSION: 4.2.2

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Linux Godot
        shell: bash
        run: |
          set -euo pipefail
          curl -L --fail --retry 3 -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64
          sudo mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot

      - name: Validate project loads
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --quit --path .

      - name: Run expanded mechanism physics test
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --path . --script res://scripts/physics_test_runner.gd

      - name: Run invariant test suite
        shell: bash
        run: |
          set -euo pipefail
          godot --headless --path . --script res://scripts/tests/test_suite.gd

  build-macos:
    needs: test-linux
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Godot editor
        shell: bash
        run: |
          set -euo pipefail
          curl -L --fail --retry 3 -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip"
          unzip -q godot.zip
          mv Godot.app godot

      - name: Install export templates
        shell: bash
        run: |
          set -euo pipefail
          curl -L --fail --retry 3 -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mkdir -p "$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          unzip -q -o templates.tpz -d "$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          test -d "$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"

      - name: Validate export preset
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'platform="macOS"' export_presets.cfg

      - name: Validate project loads
        shell: bash
        run: |
          set -euo pipefail
          godot/Godot.app/Contents/MacOS/Godot --headless --quit --path .

      - name: Run expanded mechanism physics test
        shell: bash
        run: |
          set -euo pipefail
          godot/Godot.app/Contents/MacOS/Godot --headless --path . --script res://scripts/physics_test_runner.gd

      - name: Run invariant test suite
        shell: bash
        run: |
          set -euo pipefail
          godot/Godot.app/Contents/MacOS/Godot --headless --path . --script res://scripts/tests/test_suite.gd

      - name: Export macOS app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          godot/Godot.app/Contents/MacOS/Godot --headless --verbose --path . --export-release "macOS" build/ClockworkEpicycles.app
          test -d build/ClockworkEpicycles.app
          xattr -cr build/ClockworkEpicycles.app || true

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          cd build
          ditto -c -k --sequesterRsrc --keepParent ClockworkEpicycles.app ClockworkEpicycles-macOS.zip
          test -f ClockworkEpicycles-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clockwork-epicycles-macos
          path: build/ClockworkEpicycles-macOS.zip
