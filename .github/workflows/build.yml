name: Godot Mechanical System CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

env:
  GODOT_VERSION: 4.2.2

jobs:
  test-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          set -euo pipefail
          curl -L --fail --retry 3 -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip
          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64
          sudo mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot

      - name: Check project structure
        run: |
          test -f project.godot
          test -d scripts

      - name: Import and validate project
        run: |
          timeout 30 godot --headless --import --path . || true
          timeout 10 godot --headless --quit --path . || true

      - name: Run physics test
        timeout-minutes: 3
        run: |
          timeout 120 godot --headless --path . --script res://scripts/physics_test_runner.gd

      - name: Run invariant test suite
        timeout-minutes: 3
        run: |
          timeout 120 godot --headless --path . --script res://scripts/tests/test_suite.gd

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-logs
          path: |
            *.log
            .godot/

  build-macos:
    needs: test-linux
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Godot
        run: |
          set -euo pipefail
          curl -L --fail --retry 3 -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip"
          unzip -q godot.zip
          ls -la
          GODOT_BIN=$(find . -name "Godot" -path "*/MacOS/*" | head -1)
          echo "GODOT_BIN=${GODOT_BIN}" >> $GITHUB_ENV

      - name: Install export templates
        run: |
          set -euo pipefail
          curl -L --fail --retry 3 -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mkdir -p "$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          unzip -q -o templates.tpz -d "$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"

      - name: Validate export preset
        run: grep -q 'platform="macOS"' export_presets.cfg

      - name: Import project
        run: |
          timeout 30 ${GODOT_BIN} --headless --import --path . || true
          timeout 10 ${GODOT_BIN} --headless --quit --path . || true

      - name: Run physics test
        timeout-minutes: 3
        run: |
          ${GODOT_BIN} --headless --path . --script res://scripts/physics_test_runner.gd

      - name: Run invariant test suite
        timeout-minutes: 3
        run: |
          ${GODOT_BIN} --headless --path . --script res://scripts/tests/test_suite.gd

      - name: Export macOS app
        run: |
          set -euo pipefail
          mkdir -p build
          ${GODOT_BIN} --headless --verbose --path . --export-release "macOS" build/ClockworkEpicycles.app
          test -d build/ClockworkEpicycles.app
          xattr -cr build/ClockworkEpicycles.app || true

      - name: Package artifact
        run: |
          cd build
          ditto -c -k --sequesterRsrc --keepParent ClockworkEpicycles.app ClockworkEpicycles-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clockwork-epicycles-macos
          path: build/ClockworkEpicycles-macOS.zip
