<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clockwork Epicycles</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #070a10; color: #c8ccd4; font-family: system-ui, sans-serif; }
  #status { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 16px; }
  #status p { font-size: 14px; opacity: 0.7; }
  #game-frame { width: 100%; height: 100%; border: none; display: none; }
</style>
</head>
<body>
<div id="status">
  <p id="msg">Initializing cross-origin isolation...</p>
</div>
<iframe id="game-frame" allow="cross-origin-isolated"></iframe>
<script>
(async function() {
  const msg = document.getElementById("msg");
  const frame = document.getElementById("game-frame");
  const statusDiv = document.getElementById("status");

  // If already isolated, go straight to the game
  if (window.crossOriginIsolated) {
    msg.textContent = "Loading Clockwork Epicycles...";
    window.location.replace("index.html");
    return;
  }

  // Register the service worker
  if (!("serviceWorker" in navigator)) {
    msg.textContent = "Service Workers not supported. Try Chrome or Firefox.";
    return;
  }

  try {
    msg.textContent = "Registering service worker...";
    const reg = await navigator.serviceWorker.register("coi-serviceworker.js");

    // Wait for it to become active
    if (!reg.active) {
      msg.textContent = "Activating service worker...";
      await new Promise((resolve) => {
        const sw = reg.installing || reg.waiting;
        if (!sw) { resolve(); return; }
        sw.addEventListener("statechange", () => {
          if (sw.state === "activated") resolve();
        });
        // Safety timeout
        setTimeout(resolve, 5000);
      });
    }

    // The SW is now active. Reload so it intercepts this page's responses.
    msg.textContent = "Service worker active. Reloading with isolation...";
    // Small delay to ensure the SW is controlling this page
    await new Promise(r => setTimeout(r, 300));
    window.location.reload();

  } catch (e) {
    msg.textContent = "Failed to enable cross-origin isolation: " + e.message;
    console.error("SW registration error:", e);
  }
})();
</script>
</body>
</html>
